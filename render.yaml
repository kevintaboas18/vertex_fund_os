# Render Blueprint para Vertex Fund OS (Warren Buffett Jr).
# Las claves NO van aquí: se configuran en el dashboard (sync: false pide el valor).
services:
  - type: web
    name: vertex-fund-os
    runtime: python
    # 'free' funciona sin tarjeta (se duerme tras inactividad). Para "siempre
    # encendido" + disco persistente, sube a 'starter' y descomenta el bloque disk.
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn vertex_api:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    # --- Disco persistente (SOLO en planes de pago: starter+). Descomenta si subes de plan ---
    # disk:
    #   name: vertex-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EDGAR_USER_AGENT
        value: "Vertex Fund OS - Kevin Taboas kevintaboas02@gmail.com"
      # Con disco (plan pago) añade: VERTEX_DB=/var/data/vertex.db para conservar la memoria.
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: QUANTDATA_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        sync: false
      - key: SCHWAB_APP_KEY
        sync: false
      - key: SCHWAB_APP_SECRET
        sync: false
      - key: SNAPTRADE_CLIENT_ID
        sync: false
      - key: SNAPTRADE_CONSUMER_KEY
        sync: false
      - key: SNAPTRADE_USER_ID
        sync: false
      - key: SNAPTRADE_USER_SECRET
        sync: false
